<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — The Ethereal Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":               "#226868",
            "primary-fixed":         "#aceeee",
            "on-primary-fixed":      "#002020",
            "surface":               "#f8fafa",
            "surface-container":     "#eceeee",
            "surface-container-low": "#f2f4f4",
            "on-surface":            "#191c1d",
            "on-surface-variant":    "#3f4948",
            "outline-variant":       "#bfc8c8",
            "secondary":             "#4d6452",
            "error":                 "#ba1a1a",
            "error-container":       "#ffdad6",
            "on-error-container":    "#93000a",
          },
          fontFamily: { body: ["Inter","sans-serif"] },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    @keyframes fade-up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fade-up .4s ease forwards; }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 8s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }
  </style>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background blobs -->
  <div class="blob w-96 h-96 bg-[#226868] top-[-80px] left-[-80px]"></div>
  <div class="blob w-72 h-72 bg-[#5fa0a0] bottom-[-60px] right-[-60px]" style="animation-delay:2s"></div>
  <div class="blob w-48 h-48 bg-[#aceeee] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" style="animation-delay:4s"></div>

  <!-- Login card -->
  <div class="relative z-10 w-full max-w-sm mx-4 fade-up">

    <!-- Logo / header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/30">
        <span class="material-symbols-outlined text-white text-3xl"
              style="font-variation-settings:'FILL' 1;">admin_panel_settings</span>
      </div>
      <h1 class="text-2xl font-black text-primary tracking-tight">The Ethereal Clinic</h1>
      <p class="text-sm text-secondary mt-1">Admin Panel — Secure Access</p>
    </div>

    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_24px_64px_-12px_rgba(34,104,104,0.18)] border border-white/60 p-8">

      <!-- Error message -->
      {% if error %}
      <div class="flex items-center gap-3 bg-error-container text-on-error-container rounded-xl px-4 py-3 mb-6 text-sm font-medium">
        <span class="material-symbols-outlined text-[18px]">error</span>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-5">

        <!-- Admin ID -->
        <div>
          <label class="block text-xs font-bold text-secondary uppercase tracking-widest mb-2">
            Admin ID
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-outline text-[20px]">
              person
            </span>
            <input type="text"
                   name="admin_id"
                   placeholder="Enter your ID"
                   autocomplete="username"
                   required
                   class="w-full pl-11 pr-4 py-3 bg-surface-container-low border border-outline-variant/30
                          rounded-xl text-sm focus:outline-none focus:ring-2 ring-primary/30
                          transition-all placeholder:text-on-surface-variant/40" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-bold text-secondary uppercase tracking-widest mb-2">
            Password
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-outline text-[20px]">
              lock
            </span>
            <input type="password"
                   id="password-input"
                   name="password"
                   placeholder="Enter your password"
                   autocomplete="current-password"
                   required
                   class="w-full pl-11 pr-12 py-3 bg-surface-container-low border border-outline-variant/30
                          rounded-xl text-sm focus:outline-none focus:ring-2 ring-primary/30
                          transition-all placeholder:text-on-surface-variant/40" />
            <!-- Show/hide toggle -->
            <button type="button"
                    onclick="togglePassword()"
                    class="absolute right-3.5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
              <span id="eye-icon" class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-primary text-white py-3.5 rounded-xl font-bold text-sm
                       hover:opacity-90 active:scale-[.98] transition-all duration-200
                       shadow-md shadow-primary/25 mt-2">
          Sign In to Admin Panel
        </button>

      </form>

      <!-- Footer note -->
      <p class="text-center text-[11px] text-outline mt-6">
        Authorized personnel only · The Ethereal Clinic
      </p>
    </div>

    <!-- Back to chat -->
    <div class="text-center mt-6">
      <a href="/" class="text-xs text-secondary hover:text-primary transition-colors flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[14px]">arrow_back</span>
        Back to AI Counselor
      </a>
    </div>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password-input');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }
  </script>

</body>
</html>
